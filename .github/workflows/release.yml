name: Publish release APK

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish or retry
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1"

      - name: Validate release configuration
        env:
          SARA_BUTTON_KEYSTORE_BASE64: ${{ secrets.SARA_BUTTON_KEYSTORE_BASE64 }}
          SARA_BUTTON_KEYSTORE_PASSWORD: ${{ secrets.SARA_BUTTON_KEYSTORE_PASSWORD }}
          SARA_BUTTON_KEY_ALIAS: ${{ secrets.SARA_BUTTON_KEY_ALIAS }}
          SARA_BUTTON_KEY_PASSWORD: ${{ secrets.SARA_BUTTON_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag $RELEASE_TAG is not a semantic version such as v2.3.0." >&2
            exit 1
          fi
          release_version="${RELEASE_TAG#v}"
          gradle_version="$(sed -n "s/^[[:space:]]*versionName '\([^']*\)'.*/\1/p" app/build.gradle)"
          if [[ "$release_version" != "$gradle_version" ]]; then
            echo "Tag $RELEASE_TAG does not match Gradle version $gradle_version." >&2
            exit 1
          fi
          for variable_name in \
            SARA_BUTTON_KEYSTORE_BASE64 \
            SARA_BUTTON_KEYSTORE_PASSWORD \
            SARA_BUTTON_KEY_ALIAS \
            SARA_BUTTON_KEY_PASSWORD; do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "Required GitHub Actions secret $variable_name is missing." >&2
              exit 1
            fi
          done

      - name: Restore release signing key
        env:
          SARA_BUTTON_KEYSTORE_BASE64: ${{ secrets.SARA_BUTTON_KEYSTORE_BASE64 }}
          SARA_BUTTON_KEYSTORE_PATH: ${{ runner.temp }}/sarabutton-release.jks
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$SARA_BUTTON_KEYSTORE_BASE64" | base64 --decode > "$SARA_BUTTON_KEYSTORE_PATH"
          chmod 600 "$SARA_BUTTON_KEYSTORE_PATH"

      - name: Test, lint, and build signed APK
        env:
          SARA_BUTTON_KEYSTORE_PATH: ${{ runner.temp }}/sarabutton-release.jks
          SARA_BUTTON_KEYSTORE_PASSWORD: ${{ secrets.SARA_BUTTON_KEYSTORE_PASSWORD }}
          SARA_BUTTON_KEY_ALIAS: ${{ secrets.SARA_BUTTON_KEY_ALIAS }}
          SARA_BUTTON_KEY_PASSWORD: ${{ secrets.SARA_BUTTON_KEY_PASSWORD }}
        run: ./gradlew --no-daemon testDebugUnitTest lintDebug assembleRelease

      - name: Verify and package APK
        id: package
        shell: bash
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#v}"
          release_directory="$RUNNER_TEMP/release"
          apk_name="SaraButton-${release_version}.apk"
          mkdir -p "$release_directory"
          cp app/build/outputs/apk/release/app-release.apk "$release_directory/$apk_name"
          "$ANDROID_HOME/build-tools/35.0.1/apksigner" verify \
            --verbose \
            --print-certs \
            "$release_directory/$apk_name"
          (
            cd "$release_directory"
            sha256sum "$apk_name" > "$apk_name.sha256"
          )
          echo "apk_path=$release_directory/$apk_name" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$release_directory/$apk_name.sha256" >> "$GITHUB_OUTPUT"

      - name: Attest APK provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.package.outputs.apk_path }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: ${{ steps.package.outputs.apk_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" \
              "$APK_PATH" \
              "$CHECKSUM_PATH" \
              --verify-tag \
              --generate-notes \
              --title "Sara Button $RELEASE_TAG"
          fi
